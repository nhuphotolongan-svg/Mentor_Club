name: Đăng Reel Facebook

on:
  repository_dispatch:
    types: [dang-reel]

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Đăng Reel
        env:
          LARK_APP_ID:        ${{ vars.LARK_APP_ID }}
          LARK_APP_SECRET:    ${{ secrets.LARK_APP_SECRET }}
          LARK_APP_TOKEN:     ${{ vars.LARK_APP_TOKEN }}
          LARK_TABLE_ID:      ${{ vars.LARK_TABLE_ID }}
          LARK_PAGES_TABLE_ID: ${{ vars.LARK_PAGES_TABLE_ID }}
          RECORD_ID:          ${{ github.event.client_payload.record_id }}
        run: node skills/dang-reel-facebook/scripts/post-reels-multi.js
